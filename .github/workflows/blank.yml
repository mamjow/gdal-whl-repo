permissions:
  contents: write
name: GDAL Build & Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag for GitHub release"
        required: true
      gdal_url:
        description: "URL of GDAL source tarball"
        required: true
        default: "https://download.osgeo.org/gdal/3.11.4/gdal-3.11.4.tar.gz"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake wget \
            libtiff-dev libgeotiff-dev \
            libjpeg-dev libpng-dev \
            libsqlite3-dev libcurl4-openssl-dev \
            libproj-dev proj-data proj-bin \
            libexpat1-dev libxerces-c-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools build numpy

      - name: Download and build GDAL
        run: |
          wget ${{ github.event.inputs.gdal_url }} -O gdal.tar.gz
          tar -xvf gdal.tar.gz
          GDAL_DIR=$(tar -tf gdal.tar.gz | head -1 | cut -f1 -d"/")
          cd $GDAL_DIR
          echo "GDAL_DIR=$GDAL_DIR" >> $GITHUB_ENV
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_PYTHON_BINDINGS=ON
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Inject version into build
        run: |
          cd $GDAL_DIR/swig/python
          VERSION="${{ github.event.inputs.release_tag }}"
          cat <<EOF > pyproject.toml
          [build-system]
          requires = ["setuptools>=61", "wheel", "numpy"]
          build-backend = "setuptools.build_meta"
      
          [project]
          name = "gdal"
          version = "$VERSION"
          readme = "README.md"
      
          [project.scripts]
          rgb2pct = "osgeo_utils.rgb2pct:main"
          pct2rgb = "osgeo_utils.pct2rgb:main"
          ogrmerge = "osgeo_utils.ogrmerge:main"
          ogr_layer_algebra = "osgeo_utils.ogr_layer_algebra:main"
          gdalmove = "osgeo_utils.gdalmove:main"
          gdalcompare = "osgeo_utils.gdalcompare:main"
          gdalattachpct = "osgeo_utils.gdalattachpct:main"
          gdal_sieve = "osgeo_utils.gdal_sieve:main"
          gdal_retile = "osgeo_utils.gdal_retile:main"
          gdal_proximity = "osgeo_utils.gdal_proximity:main"
          gdal_polygonize = "osgeo_utils.gdal_polygonize:main"
          gdal_pansharpen = "osgeo_utils.gdal_pansharpen:main"
          gdal_merge = "osgeo_utils.gdal_merge:main"
          gdal_fillnodata = "osgeo_utils.gdal_fillnodata:main"
          gdal_edit = "osgeo_utils.gdal_edit:main"
          gdal_calc = "osgeo_utils.gdal_calc:main"
          gdal2xyz = "osgeo_utils.gdal2xyz:main"
          gdal2tiles = "osgeo_utils.gdal2tiles:main"
      
          [project.optional-dependencies]
          numpy = ["numpy>1.0.0"]
          EOF
          cat pyproject.toml  # debug

      - name: Build GDAL Python wheel
        run: |
          cd $GDAL_DIR/swig/python

          python -m pip install --upgrade pip setuptools wheel numpy

          # NumPy include dir
          NUMPY_INCLUDEDIR=$(python -c "import numpy; print(numpy.get_include())")

          # Generate setup.py from template
          cp setup.py.in setup.py

          # Inject version
          VERSION="${{ github.event.inputs.release_tag }}"
          VERSION="${VERSION#v}"

          # Detect GDAL library and include paths
          GDAL_LIB=$(ldconfig -p | grep libgdal.so | head -1 | awk '{print $4}' | xargs dirname)

          # Replace placeholders safely
          sed -i \
            -e "s|@GDAL_PYTHON_VERSION@|$VERSION|g" \
            -e "s|@PROJECT_BINARY_DIR@|.|g" \
            -e "s|@PROJECT_SOURCE_DIR@|$GDAL_DIR|g" \
            -e "s|@GDAL_LIB_DIR@|'$GDAL_LIB'|g" \
            -e "s|@GDAL_LIB_OUTPUT_NAME@|gdal|g" \
            -e "s|@GNM_ENABLED@|0|g" \
            -e "s|@CMAKE_OSX_SYSROOT@||g" \
            setup.py

          # Build compiled wheel
          python setup.py bdist_wheel

          ls -lah dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ env.GDAL_DIR }}/swig/python/dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
