name: Build GDAL Wheel

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "URL to GDAL source tarball"
        required: true
        default: "https://download.osgeo.org/gdal/3.11.4/gdal-3.11.4.tar.gz"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            python3-pip \
            python3-venv \
            wget \
            libproj-dev \
            proj-data \
            proj-bin \
            libgeos-dev \
            libtiff-dev \
            libjpeg-dev \
            libpng-dev \
            libsqlite3-dev \
            libcurl4-openssl-dev \
            swig \
            git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip and install build tools
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Download GDAL source
        run: |
          wget "${{ github.event.inputs.source_url }}" -O gdal.tar.gz
          mkdir src
          tar -xf gdal.tar.gz -C src --strip-components=1

      - name: Build GDAL library
        run: |
          cd src
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install

      - name: Build Python wheel
        run: |
          cd src/swig/python
          python -m build --wheel

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdal-wheel
          path: src/swig/python/dist/*.whl

      - name: Create GitHub release with wheel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "GDAL Wheel Build #${{ github.run_number }}"
          files: src/swig/python/dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}