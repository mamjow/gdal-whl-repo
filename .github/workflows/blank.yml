name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          apt install -y \
          build-essential cmake \
          libtiff-dev libgeotiff-dev \
          libjpeg-dev libpng-dev \
          libsqlite3-dev libcurl4-openssl-dev \
          libproj-dev proj-data proj-bin \
          libexpat1-dev libxerces-c-dev

      - name: Download and extract GDAL
        run: |
          wget https://download.osgeo.org/gdal/3.11.4/gdal-3.11.4.tar.gz
          tar -xvf gdal-3.11.4.tar.gz
          cd gdal-3.11.4

      - name: Run a one-line script
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools numpy

      - name: Build wheel
        run: |
          python setup.py bdist_wheel
        env:
          CPLUS_INCLUDE_PATH: /usr/local/include
          C_INCLUDE_PATH: /usr/local/include
          LD_LIBRARY_PATH: /usr/local/lib

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
