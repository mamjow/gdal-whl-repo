permissions:
  contents: write
name: GDAL Build & Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag for GitHub release"
        required: true
      gdal_url:
        description: "URL of GDAL source tarball"
        required: true
        default: "https://download.osgeo.org/gdal/3.11.4/gdal-3.11.4.tar.gz"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake wget \
            libtiff-dev libgeotiff-dev \
            libjpeg-dev libpng-dev \
            libsqlite3-dev libcurl4-openssl-dev \
            libproj-dev proj-data proj-bin \
            libexpat1-dev libxerces-c-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools build numpy

      - name: Download and build GDAL
        run: |
          wget ${{ github.event.inputs.gdal_url }} -O gdal.tar.gz
          tar -xvf gdal.tar.gz
          GDAL_DIR=$(tar -tf gdal.tar.gz | head -1 | cut -f1 -d"/")
          cd $GDAL_DIR
          echo "GDAL_DIR=$GDAL_DIR" >> $GITHUB_ENV
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_PYTHON_BINDINGS=ON
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Inject version into build
        run: |
          cd $GDAL_DIR/swig/python
          VERSION="${{ github.event.inputs.release_tag }}"
          cat <<EOF > pyproject.toml
          [build-system]
          requires = ["setuptools>=61", "wheel", "numpy"]
          build-backend = "setuptools.build_meta"

          [project]
          name = "gdal"
          version = "$VERSION"
          EOF
          cat pyproject.toml  # debug

      - name: Build GDAL Python wheel
        run: |
          cd $GDAL_DIR/swig/python

          python -m pip install --upgrade pip setuptools wheel numpy

          export NUMPY_INCLUDEDIR=$(python -c "import numpy; print(numpy.get_include())")

          # Generate setup.py from template
          cp setup.py.in setup.py

          # Inject version
          VERSION="${{ github.event.inputs.release_tag }}"
          VERSION="${VERSION#v}"
          # find gdal library path using ldconfig
          GDAL_LIB=$(ldconfig -p | grep libgdal.so | head -1 | awk '{print $4}' | xargs dirname)
          # Try replacing common GDAL version placeholders
          sed -i "s/@GDAL_VERSION@/$VERSION/g" setup.py || true
          sed -i "s/@VERSION@/$VERSION/g" setup.py || true
          sed -i "s|@GDAL_LIB_DIR@|$GDAL_LIB|" setup.py
          # Build compiled wheel (THIS is the key fix)
          python setup.py bdist_wheel

          ls -lah dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ env.GDAL_DIR }}/swig/python/dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
